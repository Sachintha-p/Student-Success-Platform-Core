# ─── Dev Profile ──────────────────────────────────────────────
# Override base application.properties for local development

# ─── DataSource ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://ep-winter-butterfly-a12mx8fp-pooler.ap-southeast-1.aws.neon.tech/neondb
spring.datasource.username=neondb_owner
spring.datasource.password=npg_si3wmbHR2chn
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update


# ─── JPA (verbose for dev) ────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Spring AI ────────────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4
spring.ai.openai.chat.options.temperature=0.7

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ─── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Mail (dev: MailHog or Mailtrap) ──────────────────────────
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=${MAIL_USERNAME:dev@sliit.lk}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.sliit.studentplatform=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
